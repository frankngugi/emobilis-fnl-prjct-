services:
  - type: web
    name: rgc-nyahururu-cms
    env: python
    region: frankfurt
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py load_hymns &&
      python manage.py shell -c "
from django.contrib.auth import get_user_model;
from myapp.models import BranchChurch;
import os;
User = get_user_model();
u = os.environ.get('DJANGO_SUPERUSER_USERNAME','admin');
e = os.environ.get('DJANGO_SUPERUSER_EMAIL','');
p = os.environ.get('DJANGO_SUPERUSER_PASSWORD','');
User.objects.filter(username=u).exists() or (p and User.objects.create_superuser(u,e,p) and print('Superuser created'));
BranchChurch.objects.get_or_create(name='RGC Nyahururu HQ',defaults={'region':'nyahururu','location':'Nyahururu Town, Laikipia County','status':'active','latitude':-0.0296,'longitude':36.3590,'notes':'Central Rift Regional Headquarters'});
print('Setup complete');
"
    startCommand: gunicorn msys.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/categories/
    envVars:
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: rgc-nyahururu-cms.onrender.com
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_TILL_NUMBER
        value: "538394"
      - key: AT_USERNAME
        value: sandbox
      - key: DATABASE_URL
        fromDatabase:
          name: rgc-db
          property: connectionString

databases:
  - name: rgc-db
    databaseName: rgc_cms
    plan: free
    region: frankfurt
