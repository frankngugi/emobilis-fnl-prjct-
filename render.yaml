services:
  - type: web
    name: rgc-nyahururu-cms
    env: python
    region: oregon
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py load_hymns
    startCommand: gunicorn msys.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: rgc-nyahururu-cms.onrender.com
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: DATABASE_URL
        fromDatabase:
          name: rgc-db
          property: connectionString

databases:
  - name: rgc-db
    databaseName: rgc_cms
    plan: free
