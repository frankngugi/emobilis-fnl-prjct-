{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email – RGC Nyahururu</title>
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <style>
    body { background: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border-radius: 16px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 450px; padding: 40px 35px; }
    .btn-church { background: linear-gradient(135deg, #8b0000, #c9a227); border: none; color: #fff; padding: 13px; border-radius: 8px; font-weight: 600; width: 100%; }
    .otp-input { letter-spacing: 0.5em; font-size: 1.5rem; text-align: center; font-weight: 700; border-radius: 10px; border: 2px solid #ddd; padding: 14px; }
    .otp-input:focus { border-color: #8b0000; box-shadow: 0 0 0 3px rgba(139,0,0,0.15); outline: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card mx-auto text-center">
      <div class="mb-3">
        <i class="bi bi-shield-check" style="font-size:3rem; color:#8b0000;"></i>
      </div>
      <h4 class="fw-bold">Email Verification</h4>
      <p class="text-muted mb-4">Enter the 6-digit code sent to your email address</p>

      {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <input type="email" name="email" class="form-control mb-3" placeholder="Your email address" required>
          <input type="text" name="code" class="form-control otp-input" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
        </div>
        <button type="submit" class="btn-church mb-3"><i class="bi bi-check-circle me-2"></i>Verify Email</button>
      </form>
      <a href="/register" class="text-muted small">Resend code? Re-register with same email</a>
    </div>
  </div>
  <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
