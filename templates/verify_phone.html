{% extends "base.html" %}
{% block title %}Verify OTP – RGC Nyahururu{% endblock %}
{% block content %}
<div style="margin-top:80px; background:#f5f5f5; min-height:calc(100vh - 70px); display:flex; align-items:center; justify-content:center;" class="py-5">
  <div class="card border-0 shadow p-4 rounded-4" style="max-width:420px; width:100%;">
    <div class="text-center mb-3">
      <i class="bi bi-shield-check" style="font-size:2.5rem; color:#8b0000;"></i>
      <h5 class="fw-bold mt-2">Enter OTP Code</h5>
      <p class="text-muted small">Check your phone for the 6-digit verification code</p>
    </div>
    {% if messages %}{% for m in messages %}<div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %}">{{ m }}</div>{% endfor %}{% endif %}
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <input type="text" name="code" class="form-control text-center fw-bold" placeholder="000000" maxlength="6" pattern="\d{6}" style="font-size:1.5rem; letter-spacing:0.5em;" required autofocus>
      </div>
      <button type="submit" class="btn btn-danger w-100">Verify Phone</button>
      <a href="/send-phone-otp/" class="btn btn-outline-secondary w-100 mt-2">Resend OTP</a>
    </form>
  </div>
</div>
{% endblock %}
